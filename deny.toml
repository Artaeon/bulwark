# cargo-deny configuration for bulwark
#
# Run: cargo deny check
# Install: cargo install cargo-deny

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "aarch64-unknown-linux-gnu" },
]

[advisories]
# Fail on any known security vulnerability in the dependency tree
yanked = "deny"
ignore = []

[licenses]
# Permissive licenses acceptable for a security tool.
# All entries are permissive / public-domain-equivalent.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    # webpki-roots — Mozilla CA bundle
    "CDLA-Permissive-2.0",
    # r-efi (EFI support, not linked on Linux but pulled transitively)
    "LGPL-2.1-or-later",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
