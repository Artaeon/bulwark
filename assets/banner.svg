<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" fill="none">
  <defs>
    <clipPath id="rounded">
      <rect width="900" height="220" rx="10"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="900" height="220" fill="#0a0e1a"/>

    <!-- Shield icon -->
    <g transform="translate(60, 75)" stroke="#22d3ee" stroke-width="1.8" fill="none" stroke-linejoin="round">
      <path d="M35 4 L64 16 L64 42 C64 60 51 72 35 80 C19 72 6 60 6 42 L6 16 Z"/>
    </g>

    <!-- Title -->
    <text x="150" y="122" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
          font-size="52" font-weight="600" fill="#f1f5f9" letter-spacing="4">
      bulwark
    </text>

    <!-- Subtitle -->
    <text x="152" y="152" font-family="'Inter', system-ui, sans-serif"
          font-size="15" fill="#64748b" letter-spacing="1.5" font-weight="400">
      network security for open wireless
    </text>

    <!-- Accent line -->
    <rect x="152" y="168" width="48" height="2" fill="#22d3ee"/>
  </g>
</svg>
