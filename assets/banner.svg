<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="60%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="rounded">
      <rect width="900" height="280" rx="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="900" height="280" fill="url(#bg)"/>

    <!-- Grid pattern -->
    <g opacity="0.04" stroke="#22d3ee">
      <line x1="0" y1="40" x2="900" y2="40"/>
      <line x1="0" y1="80" x2="900" y2="80"/>
      <line x1="0" y1="120" x2="900" y2="120"/>
      <line x1="0" y1="160" x2="900" y2="160"/>
      <line x1="0" y1="200" x2="900" y2="200"/>
      <line x1="0" y1="240" x2="900" y2="240"/>
      <line x1="60" y1="0" x2="60" y2="280"/>
      <line x1="120" y1="0" x2="120" y2="280"/>
      <line x1="180" y1="0" x2="180" y2="280"/>
      <line x1="240" y1="0" x2="240" y2="280"/>
      <line x1="300" y1="0" x2="300" y2="280"/>
      <line x1="360" y1="0" x2="360" y2="280"/>
      <line x1="420" y1="0" x2="420" y2="280"/>
      <line x1="480" y1="0" x2="480" y2="280"/>
      <line x1="540" y1="0" x2="540" y2="280"/>
      <line x1="600" y1="0" x2="600" y2="280"/>
      <line x1="660" y1="0" x2="660" y2="280"/>
      <line x1="720" y1="0" x2="720" y2="280"/>
      <line x1="780" y1="0" x2="780" y2="280"/>
      <line x1="840" y1="0" x2="840" y2="280"/>
    </g>

    <!-- Network topology decoration (left side) -->
    <g opacity="0.12" stroke="#22d3ee" stroke-width="1" filter="url(#softglow)">
      <!-- Nodes -->
      <circle cx="80" cy="70" r="4" fill="#22d3ee"/>
      <circle cx="140" cy="110" r="3" fill="#22d3ee"/>
      <circle cx="60" cy="160" r="3" fill="#22d3ee"/>
      <circle cx="160" cy="180" r="4" fill="#22d3ee"/>
      <circle cx="100" cy="220" r="3" fill="#22d3ee"/>
      <!-- Links -->
      <line x1="80" y1="70" x2="140" y2="110"/>
      <line x1="140" y1="110" x2="60" y2="160"/>
      <line x1="60" y1="160" x2="160" y2="180"/>
      <line x1="160" y1="180" x2="100" y2="220"/>
      <line x1="80" y1="70" x2="60" y2="160"/>
      <line x1="140" y1="110" x2="160" y2="180"/>
    </g>

    <!-- Network topology decoration (right side) -->
    <g opacity="0.12" stroke="#6366f1" stroke-width="1" filter="url(#softglow)">
      <circle cx="760" cy="60" r="3" fill="#6366f1"/>
      <circle cx="820" cy="100" r="4" fill="#6366f1"/>
      <circle cx="740" cy="150" r="3" fill="#6366f1"/>
      <circle cx="830" cy="180" r="3" fill="#6366f1"/>
      <circle cx="780" cy="230" r="4" fill="#6366f1"/>
      <line x1="760" y1="60" x2="820" y2="100"/>
      <line x1="820" y1="100" x2="740" y2="150"/>
      <line x1="740" y1="150" x2="830" y2="180"/>
      <line x1="830" y1="180" x2="780" y2="230"/>
      <line x1="760" y1="60" x2="740" y2="150"/>
      <line x1="820" y1="100" x2="830" y2="180"/>
    </g>

    <!-- Scanning line effect -->
    <rect x="0" y="135" width="900" height="1" fill="url(#accent)" opacity="0.06"/>

    <!-- Shield icon -->
    <g transform="translate(350, 50)" filter="url(#glow)">
      <path d="M50 8 L90 25 L90 60 C90 90 70 110 50 120 C30 110 10 90 10 60 L10 25 Z"
            fill="none" stroke="url(#shield)" stroke-width="2.5" opacity="0.9"/>
      <!-- WiFi symbol inside shield -->
      <g transform="translate(50, 58)" stroke="url(#shield)" fill="none" stroke-width="2" stroke-linecap="round">
        <path d="M-20,-12 C-12,-20 12,-20 20,-12" opacity="0.5"/>
        <path d="M-14,-6 C-8,-12 8,-12 14,-6" opacity="0.7"/>
        <path d="M-8,0 C-4,-5 4,-5 8,0" opacity="0.9"/>
        <circle cx="0" cy="6" r="2.5" fill="url(#shield)"/>
      </g>
      <!-- Checkmark overlay -->
      <g transform="translate(50, 85)" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
        <polyline points="-8,0 -3,5 8,-6"/>
      </g>
    </g>

    <!-- Title -->
    <text x="450" y="198" text-anchor="middle"
          font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace"
          font-size="48" font-weight="700" fill="#f1f5f9" letter-spacing="6">
      BULWARK
    </text>

    <!-- Subtitle -->
    <text x="450" y="232" text-anchor="middle"
          font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
          font-size="14" fill="#94a3b8" letter-spacing="3.5" font-weight="400">
      WIRELESS NETWORK SECURITY DAEMON
    </text>

    <!-- Bottom accent line -->
    <rect x="320" y="252" width="260" height="1.5" rx="1" fill="url(#accent)" opacity="0.4"/>

    <!-- Corner accents -->
    <g opacity="0.15" stroke="url(#accent)" stroke-width="1.5">
      <polyline points="20,40 20,20 40,20" fill="none"/>
      <polyline points="860,20 880,20 880,40" fill="none"/>
      <polyline points="20,240 20,260 40,260" fill="none"/>
      <polyline points="860,260 880,260 880,240" fill="none"/>
    </g>
  </g>
</svg>
